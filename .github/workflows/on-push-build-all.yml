name: Build FaceSort Package

on:
  push:
    branches:
        - main
        - try/*
  pull_request:
    branches:
        - main
  workflow_dispatch:

jobs:
  setup:
    name: Setup Build Variables
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.set-artifact-props.outputs.build-name }}
      version: ${{ steps.set-artifact-props.outputs.version }}
      deb-version: ${{ steps.set-artifact-props.outputs.deb-version }}

    steps:
    - name: Set artifact name and development version
      id: set-artifact-props
      run: |
        # Get branch name
        if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
          BRANCH_NAME="${GITHUB_HEAD_REF}"
        else
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        fi

        # Clean branch name for artifact naming
        CLEAN_NAME="$(echo "$BRANCH_NAME" | sed -E 's/^(b|feat\/|try\/)//g' | sed -e 's/ /_/g' | sed -e 's/\//_/g')"
        echo "Clean branch name is: $CLEAN_NAME"

        RUN_NUMBER=${{ github.run_number }}
        VERSION="${CLEAN_NAME}_${RUN_NUMBER}"

        # Create a Debian-compatible version (must start with a digit, and cannot contain underscores)
        CLEAN_DEB_NAME="$(echo "$CLEAN_NAME" | sed -e 's/_/-/g')"
        DEB_VERSION="1.0.0+${CLEAN_DEB_NAME}.${RUN_NUMBER}"

        echo "build-name=$VERSION" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "deb-version=$DEB_VERSION" >> $GITHUB_OUTPUT

        echo "Using artifact name: fsort-${VERSION}"
        echo "Using version: $VERSION"
        echo "Using Debian version: $DEB_VERSION"

  build-ui:
    name: Build React UI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: 'ui/package-lock.json'

    - name: Install dependencies and build React Frontend
      run: |
        cd ui
        npm ci
        npm run lint
        npm run build

    - name: Upload UI build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ui-dist
        path: ui/dist/
        retention-days: 1

  package:
    name: Create Packages (${{ matrix.arch }})
    needs: [setup, build-ui]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download UI build artifact
      uses: actions/download-artifact@v6
      with:
        name: ui-dist
        path: ui/dist

    - name: Verify UI assets
      run: |
        echo "Verifying ui/dist directory..."
        if [ ! -d "ui/dist" ] || [ ! -f "ui/dist/index.html" ]; then
          echo "ERROR: ui/dist directory is missing or incomplete"
          exit 1
        fi

        echo "✅ UI dist verified"
        find ui/dist -type f | head -10

    - name: Build Debian package
      run: |
        echo "Building Debian package for ${{ matrix.arch }}..."
        chmod +x build-deb.sh
        ./build-deb.sh "${{ needs.setup.outputs.deb-version }}" "${{ matrix.arch }}"

        # Rename the deb file to include architecture
        mv outputs/fsort_*.deb fsort_${{ needs.setup.outputs.build-name }}_${{ matrix.arch }}.deb

        echo "Debian package created:"
        ls -la fsort_${{ needs.setup.outputs.build-name }}_${{ matrix.arch }}.deb

    - name: Upload Debian package
      uses: actions/upload-artifact@v4
      with:
        name: fsort_debian_${{ needs.setup.outputs.build-name }}_${{ matrix.arch }}
        path: fsort_${{ needs.setup.outputs.build-name }}_${{ matrix.arch }}.deb

  summary:
    needs: package
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v6
      with:
        path: all-artifacts
        pattern: 'fsort*'
        merge-multiple: true

    - name: List artifacts
      run: |
        echo "## 🎉 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The following artifacts have been created:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Debian Packages:" >> $GITHUB_STEP_SUMMARY
        for file in all-artifacts/*.deb; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            size=$(ls -lh "$file" | awk '{print $5}')
            echo "- $filename ($size)" >> $GITHUB_STEP_SUMMARY
          fi
        done